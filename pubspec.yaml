name: casetally
description: AI-powered legal research app. Ask legal questions in natural language and get streaming answers with citations, source references, and relevant laws.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  web_socket_channel: ^2.4.0
  uuid: ^4.5.1
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: false

  assets:
    - assets/splash/
